<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        background: #1a1915;
        color: #f3f1ea;
        font-family: 'Segoe UI', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
      }
      .logo { font-size: 30px; font-weight: 700; color: #d97757; letter-spacing: -0.5px; }
      .sub { color: #b8b2a4; font-size: 14px; }
      .dots { display: flex; gap: 8px; margin-top: 6px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #d97757; animation: pulse 1.4s ease-in-out infinite; }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
      .hint { position: absolute; bottom: 24px; color: #5a544a; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="logo">Claude Control</div>
    <div class="sub">Starting your local server…</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="hint">First launch initializes a local database — this can take up to a minute.</div>
  </body>
</html>
